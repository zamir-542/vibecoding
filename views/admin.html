<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Minimal CMS</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="container">
            <h1>Admin Dashboard.</h1>
            <nav>
                <a href="/">View Site</a>
                <a href="#" onclick="logout()">Logout</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="admin-header">
            <h2>Manage Posts</h2>
            <button class="btn" onclick="openModal()">New Post</button>
        </div>

        <div class="admin-post-list" id="admin-posts">
            <div class="loading">Loading...</div>
        </div>
    </main>

    <!-- Post Modal -->
    <div class="modal-overlay" id="post-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Create Post</h3>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <form id="post-form">
                <input type="hidden" id="post-id">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="content">Content</label>
                    <textarea id="content" class="form-control" required></textarea>
                </div>
                <button type="submit" class="btn">Save Post</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', loadAdminPosts);

        async function loadAdminPosts() {
            const container = document.getElementById('admin-posts');
            try {
                const response = await fetch('/api/posts');
                const posts = await response.json();

                container.innerHTML = '';
                if (posts.length === 0) {
                    container.innerHTML = '<p>No posts found.</p>';
                    return;
                }

                posts.forEach(post => {
                    const div = document.createElement('div');
                    div.className = 'admin-post-item';
                    div.innerHTML = `
                        <span><strong>${escapeHTML(post.title)}</strong> - ${new Date(post.created_at).toLocaleDateString()}</span>
                        <div class="admin-post-actions">
                            <button class="btn" style="padding: 0.5rem 1rem;" onclick="editPost(${post.id})">Edit</button>
                            <button class="btn btn-danger" style="padding: 0.5rem 1rem;" onclick="deletePost(${post.id})">Delete</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (error) {
                console.error(error);
            }
        }

        document.getElementById('post-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('post-id').value;
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;

            const method = id ? 'PUT' : 'POST';
            const url = id ? '/api/posts/' + id : '/api/posts';

            try {
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content })
                });

                if (response.ok) {
                    closeModal();
                    loadAdminPosts();
                } else {
                    alert('Error saving post');
                }
            } catch (error) {
                console.error(error);
            }
        });

        async function editPost(id) {
            const response = await fetch('/api/posts');
            const posts = await response.json();
            const post = posts.find(p => p.id === id);

            if (post) {
                document.getElementById('post-id').value = post.id;
                document.getElementById('title').value = post.title;
                document.getElementById('content').value = post.content;
                document.getElementById('modal-title').textContent = 'Edit Post';
                openModal();
            }
        }

        async function deletePost(id) {
            if (confirm('Are you sure you want to delete this post?')) {
                try {
                    const response = await fetch('/api/posts/' + id, { method: 'DELETE' });
                    if (response.ok) {
                        loadAdminPosts();
                    } else {
                        alert('Error deleting post');
                    }
                } catch (error) {
                    console.error(error);
                }
            }
        }

        function openModal() {
            document.getElementById('post-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('post-modal').classList.remove('active');
            document.getElementById('post-form').reset();
            document.getElementById('post-id').value = '';
            document.getElementById('modal-title').textContent = 'Create Post';
        }

        function logout() {
            // Clearing basic auth by requesting with fake credentials temporarily to override the browser cache
            fetch('/admin', {
                headers: {
                    'Authorization': 'Basic ' + btoa('logout:logout')
                }
            }).then(() => {
                window.location.href = '/';
            }).catch(() => {
                window.location.href = '/';
            });
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g,
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }
    </script>
</body>

</html>
